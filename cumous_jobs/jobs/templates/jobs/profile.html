{% extends 'jobs/base.html' %}

{% block title %}Мой профиль{% endblock %}

{% block content %}
<div class="container my-4">
    <h1 class="mb-4">Мой профиль</h1>
    
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-body">
                    <div id="profileInfo">
                        <div class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Загрузка...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    function loadProfile() {
        fetch('/api/my-profile/')
            .then(response => response.json())
            .then(profile => {
                document.getElementById('profileInfo').innerHTML = `
                    <div class="text-center mb-4">
                        <h3>${escapeHtml(profile.full_name || profile.username)}</h3>
                        <p class="text-muted">${escapeHtml(profile.email)}</p>
                    </div>
                    <hr>
                    <div class="row">
                        <div class="col-sm-6 mb-3">
                            <strong>Факультет</strong>
                            <p>${escapeHtml(profile.faculty) || 'Не указан'}</p>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <strong>Курс</strong>
                            <p>${getYearText(profile.year_of_study)}</p>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <strong>Телефон</strong>
                            <p>${escapeHtml(profile.phone) || 'Не указан'}</p>
                        </div>
                        <div class="col-sm-6 mb-3">
                            <strong>Имя пользователя</strong>
                            <p>${escapeHtml(profile.username)}</p>
                        </div>
                        <div class="col-12 mb-3">
                            <strong>О себе</strong>
                            <p>${escapeHtml(profile.bio) || 'Не указано'}</p>
                        </div>
                        <div class="col-12 mb-3">
                            <strong>Подписка на уведомления</strong>
                            <p>${profile.subscribe_notifications ? 'Включена' : 'Выключена'}</p>
                        </div>
                    </div>
                    <hr>
                    <div class="d-flex gap-2">
                        <a href="/profile/edit/" class="btn btn-primary">Редактировать профиль</a>
                        <a href="/dashboard/" class="btn btn-outline-secondary">Мои заявки</a>
                    </div>
                `;
            })
            .catch(error => {
                console.error('Ошибка:', error);
                document.getElementById('profileInfo').innerHTML = '<div class="alert alert-danger">Ошибка загрузки профиля</div>';
            });
    }
    
    function getYearText(year) {
        const years = {
            1: '1 курс',
            2: '2 курс', 
            3: '3 курс',
            4: '4 курс',
            5: '5 курс',
            6: 'Магистратура'
        };
        return years[year] || 'Не указан';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    loadProfile();
</script>
{% endblock %}
{% endblock %}
